name: Build MonarchModKit.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Compile
        shell: msys2 {0}
        run: |
          mkdir -p dist
          gcc monarch.c \
            -o dist/MonarchModKit.exe \
            -O2 \
            -mwindows \
            -municode \
            -DUNICODE \
            -D_UNICODE \
            -DWIN32_LEAN_AND_MEAN \
            -lcomctl32 \
            -lcomdlg32 \
            -lshell32 \
            -lshlwapi \
            -lole32 \
            -static-libgcc \
            -Wno-unused-parameter
          echo "Build complete:"
          ls -lh dist/MonarchModKit.exe

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonarchModKit
          path: dist/MonarchModKit.exe
          retention-days: 90
